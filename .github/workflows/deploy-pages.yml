name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Berechtigungen für das Deployment auf GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Nur ein gleichzeitiges Deployment, laufende werden nicht abgebrochen
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # Aktiviert GitHub Pages automatisch, falls noch nicht eingeschaltet
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Die statische Seite liegt im Repo-Wurzelverzeichnis
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
